<div class="grid gap-4 md:grid-cols-2">
    <label class="block">
        <span class="text-sm font-bold text-gray-700">Item</span>
        <select name="item" required class="mt-2 block w-full rounded-lg border-gray-300 bg-gray-50 px-3 py-3 text-sm focus:border-indigo-500 focus:ring-indigo-500">
            <option value="">Selecione...</option>
            {% for item in itens %}
            <option value="{{ item.id }}">{{ item.nome }} · saldo {{ item.saldo_atual|floatformat:3 }} {{ item.unidade_medida }}</option>
            {% endfor %}
        </select>
    </label>
    <label class="block">
        <span class="text-sm font-bold text-gray-700">Quantidade</span>
        <input name="quantidade" type="number" min="0.001" step="0.001" required class="mt-2 block w-full rounded-lg border-gray-300 bg-gray-50 px-3 py-3 text-sm focus:border-indigo-500 focus:ring-indigo-500" placeholder="0,000">
    </label>
</div>
<label class="block">
    <span class="text-sm font-bold text-gray-700">Observação</span>
    <textarea name="observacao" rows="3" class="mt-2 block w-full rounded-lg border-gray-300 bg-gray-50 px-3 py-3 text-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
</label>
<button type="submit" class="w-full rounded-lg bg-indigo-600 px-5 py-3 text-sm font-black text-white shadow-sm transition hover:bg-indigo-700">{{ botao }}</button>
